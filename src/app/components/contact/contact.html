<section id="contact" class="scroll-mt-24 mt-10 max-w-2xl mx-auto pb-12 w-full">
  <div class="text-center mb-8 group">
    <h2 class="text-3xl font-bold tracking-tight mb-4 transition-colors duration-300 group-hover:text-zinc-600 dark:group-hover:text-zinc-300 cursor-default">Let's Work Together</h2>
    <p class="text-zinc-600 dark:text-zinc-400 transition-colors duration-300 group-hover:text-zinc-900 dark:group-hover:text-zinc-200 cursor-default">
      I'm currently looking for new opportunities. Whether you have a project in mind or just want to say hi, my inbox is always open.
    </p>
  </div>

  <form (submit)="onSubmit($event)" class="flex flex-col gap-5 text-left relative">
    <div>
      <label for="name" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1.5">Name</label>
      <input type="text" id="name" name="name" [(ngModel)]="name" required
        class="w-full px-4 py-3 rounded-lg bg-zinc-50/50 dark:bg-zinc-900/20 border border-zinc-200 dark:border-zinc-800 text-zinc-900 dark:text-zinc-50 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-600 focus:ring-1 focus:ring-zinc-400 dark:focus:ring-zinc-600 transition-all duration-300 hover:shadow-sm focus:-translate-y-0.5 focus:shadow-md hover:border-zinc-300 dark:hover:border-zinc-700"
        placeholder="Your Name">
    </div>

    <div>
      <label for="email" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1.5">Email</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" required
        class="w-full px-4 py-3 rounded-lg bg-zinc-50/50 dark:bg-zinc-900/20 border border-zinc-200 dark:border-zinc-800 text-zinc-900 dark:text-zinc-50 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-600 focus:ring-1 focus:ring-zinc-400 dark:focus:ring-zinc-600 transition-all duration-300 hover:shadow-sm focus:-translate-y-0.5 focus:shadow-md hover:border-zinc-300 dark:hover:border-zinc-700"
        placeholder="you@example.com">
    </div>

    <div>
      <label for="message" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1.5">Message</label>
      <textarea id="message" name="message" [(ngModel)]="message" rows="5" required
        class="w-full px-4 py-3 rounded-lg bg-zinc-50/50 dark:bg-zinc-900/20 border border-zinc-200 dark:border-zinc-800 text-zinc-900 dark:text-zinc-50 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-600 focus:ring-1 focus:ring-zinc-400 dark:focus:ring-zinc-600 transition-all duration-300 hover:shadow-sm focus:-translate-y-0.5 focus:shadow-md hover:border-zinc-300 dark:hover:border-zinc-700 resize-y"
        placeholder="How can I help you?"></textarea>
    </div>

    <div class="flex gap-4 mt-2">
      <button type="submit" [disabled]="isSubmitting()"
        class="inline-flex flex-1 justify-center items-center px-6 py-3.5 rounded-lg bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 font-medium hover:bg-zinc-800 dark:hover:bg-zinc-200 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed disabled:hover:-translate-y-0 disabled:hover:shadow-none disabled:active:scale-100">
        {{ isSubmitting() ? 'Sending...' : 'Send Message' }}
      </button>
    </div>

    <!-- Success Message -->
    <div *ngIf="submitSuccess()" class="p-4 mt-2 rounded-lg bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 text-sm text-center border border-green-200 dark:border-green-800/50">
      Message sent successfully! I'll get back to you soon.
    </div>
    
    <!-- Error Message -->
    <div *ngIf="submitError()" class="p-4 mt-2 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-300 text-sm text-center border border-red-200 dark:border-red-800/50">
      Oops! Something went wrong. Please try again.
    </div>
  </form>
</section>
