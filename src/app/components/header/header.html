<header class="sticky top-0 z-50 w-full backdrop-blur-md bg-white/80 dark:bg-zinc-950/80 border-b border-zinc-200 dark:border-zinc-800 transition-colors duration-300">
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="#" class="font-bold text-xl tracking-tight transition-colors duration-300 hover:text-zinc-600 dark:hover:text-zinc-400">Portfolio.</a>
    <nav class="hidden md:flex gap-8 text-sm font-medium">
      <a href="#about" class="text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-300 hover:-translate-y-0.5">About</a>
      <a href="#projects" class="text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-300 hover:-translate-y-0.5">Projects</a>
      <a href="#contact" class="text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-300 hover:-translate-y-0.5">Contact</a>
    </nav>
    <div class="flex items-center gap-4">
      <button (click)="toggleTheme()" class="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all duration-300 hover:rotate-12 text-zinc-600 dark:text-zinc-400" aria-label="Toggle Dark Mode">
        <!-- Sun Icon for Dark Mode -->
        <svg *ngIf="isDarkMode()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- Moon Icon for Light Mode -->
        <svg *ngIf="!isDarkMode()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>
  </div>
</header>
