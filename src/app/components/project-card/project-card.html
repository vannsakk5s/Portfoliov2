<article class="flex flex-col p-6 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/20 hover:border-zinc-300 dark:hover:border-zinc-700 transition-all duration-300 hover:-translate-y-2 hover:shadow-xl group h-full">
  <h3 class="font-bold text-xl mb-2 transition-colors duration-300 group-hover:text-zinc-700 dark:group-hover:text-zinc-300">{{ title() }}</h3>
  <p class="text-zinc-600 dark:text-zinc-400 text-sm mb-6 flex-grow">
    {{ description() }}
  </p>
  <div class="flex flex-wrap gap-2 mb-6">
    @for (tag of tags(); track tag) {
      <span class="text-xs font-medium px-2 py-1 rounded bg-zinc-200/50 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-sm hover:bg-zinc-300/50 dark:hover:bg-zinc-700 cursor-default">{{ tag }}</span>
    }
  </div>
  <div class="flex gap-4 text-sm font-medium">
    <a [href]="demoLink() || '#'" (click)="onDemoClick($event)" class="text-zinc-900 dark:text-zinc-100 hover:underline transition-all duration-300 hover:-translate-y-0.5">Live Demo</a>
    <a [href]="githubLink()" class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-300 hover:-translate-y-0.5">GitHub</a>
  </div>
</article>

@if (showPopup) {
  <div class="toast-popup fixed bottom-6 left-1/2 z-[100] flex w-[90%] sm:w-auto items-center gap-3 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 px-6 py-4 rounded-xl shadow-2xl border border-zinc-700 dark:border-zinc-200">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-orange-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <div class="flex flex-col flex-grow">
      <span class="font-bold text-sm">Demo Unavailable</span>
      <span class="text-xs opacity-90">This project doesn't have a live demo yet.</span>
    </div>
    <button (click)="closePopup()" class="ml-2 sm:ml-4 opacity-70 hover:opacity-100 transition-opacity shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
}
